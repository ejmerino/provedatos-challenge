<div class="flex h-screen bg-slate-50 font-sans text-slate-900">
  <aside class="w-64 bg-white border-r border-slate-200 flex flex-col shadow-sm">
    <div class="p-6">
      <div class="flex items-center gap-3 text-blue-600 font-bold text-xl uppercase tracking-wider">
        <div class="w-8 h-8 bg-blue-600 rounded-lg"></div>
        Provedatos
      </div>
    </div>
    
    <nav class="flex-1 px-4 space-y-2 mt-4">
      <a routerLink="/dashboard" routerLinkActive="bg-blue-50 text-blue-600" class="flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-slate-100">
        <span>📊 Dashboard</span>
      </a>
      <a routerLink="/employees" routerLinkActive="bg-blue-50 text-blue-600" class="flex items-center gap-3 p-3 rounded-xl transition-all hover:bg-slate-100">
        <span>👥 Empleados</span>
      </a>
    </nav>

    <div class="p-4 border-t border-slate-100">
      <button (click)="logout()" class="w-full flex items-center gap-3 p-3 text-red-500 hover:bg-red-50 rounded-xl transition-all">
        <span>🚪 Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
      <h2 class="font-semibold text-slate-500">Gestión de Talento Humano</h2>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <p class="text-sm font-bold">Administrador</p>
          <p class="text-xs text-slate-400 italic">admin@provedatos.com</p>
        </div>
        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" class="w-10 h-10 rounded-full border border-slate-200">
      </div>
    </header>
    
    <section class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
